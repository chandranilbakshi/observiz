receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  # Adds a resource attribute so you can filter by service in Grafana
  resource:
    attributes:
      - key: host.name
        from_attribute: host.name
        action: upsert

  # Drops health-check traces (noisy, not useful)
  filter/drop_healthcheck:
    traces:
      span:
        - 'attributes["http.route"] == "/health"'

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Traces → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics → Prometheus (collector exposes a scrape endpoint)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: sarwam

  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Debug — shows pipeline activity in collector logs
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
  zpages:

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/drop_healthcheck, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]
